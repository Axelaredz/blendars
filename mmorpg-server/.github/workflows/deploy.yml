name: Deploy to VPS

# ============================================
# CI/CD Pipeline для продакшн деплоя
# ============================================
#
# LOCAL DEVELOPMENT WORKFLOW (SSHFS):
# ------------------------------------
# Для разработки через SSHFS используйте manage.sh:
#
# - Клиент запускается локально в графическом режиме:
#     godot --path godot-project/ --editor
#   или в Godot Editor: F5
#
# - Сервер развёртывается на VPS через SSH:
#     ./manage.sh deploy
#     ./manage.sh deploy-nakama
#     ./manage.sh deploy-server
#
# - Файлы синхронизируются через sshfs автоматически
#
# FULL CI/CD:
# ------------------------------------
# Этот workflow автоматически:
# 1. Билдит и пушит Docker образ Nakama
# 2. Билдит Godot сервер
# 3. Деплоит на VPS через SSH
# 4. Запускает health checks
# ============================================

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/blendars-nakama
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}

jobs:
  # ============================================
  # Build and push Nakama custom image
  # ============================================
  deploy-nakama:
    name: Deploy Nakama
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Nakama image
        uses: docker/build-push-action@v5
        with:
          context: ./nakama-server
          file: ./nakama-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ============================================
  # Build Godot server and deploy to VPS
  # ============================================
  deploy-game-server:
    name: Deploy Game Server
    runs-on: ubuntu-latest
    needs: deploy-nakama
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.1
          use-dotnet: false

      - name: Build Godot server
        run: |
          cd godot-project
          godot --headless --build-solutions
          godot --headless --export-release "Linux Server" ../builds/server.pck

      - name: Create server package
        run: |
          mkdir -p builds/server
          cp -r godot-project/src builds/server/
          cp builds/server.pck builds/server/
          tar -czf builds/server.tar.gz -C builds server

      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: game-server-build
          path: builds/server.tar.gz
          retention-days: 1

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ env.VPS_HOST }}
          REMOTE_USER: ${{ env.VPS_USER }}
          SOURCE: "builds/server.tar.gz"
          TARGET: "/opt/blendars/builds"
          ARGS: "-rltgoDzvO"

  # ============================================
  # Health check after deployment
  # ============================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-nakama, deploy-game-server]
    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Check Nakama health
        run: |
          curl -f http://${{ secrets.NAKAMA_HOST }}:${{ secrets.NAKAMA_PORT }}/ || exit 1

      - name: Test RPC health_check
        run: |
          curl -f -X POST http://${{ secrets.NAKAMA_HOST }}:${{ secrets.NAKAMA_PORT }}/v2/rpc/health_check \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Notify on failure
        if: failure()
        run: |
          echo "Health check failed! Check VPS for details."
          exit 1
