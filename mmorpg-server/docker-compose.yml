services:
  # ============================================
  # PostgreSQL — основная база данных
  # ============================================
  postgres:
    container_name: mmorpg_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ChangeMe_Strong_Password_123}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Только локально!
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nakama_user", "-d", "nakama"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mmorpg_network

  # ============================================
  # Nakama — игровой backend
  # ============================================
  nakama:
    container_name: mmorpg_nakama
    image: heroiclabs/nakama:3.24.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - "NAKAMA_DATABASE_ADDRESS=nakama_user:${POSTGRES_PASSWORD:-ChangeMe_Strong_Password_123}@postgres:5432/nakama"
      - "NAKAMA_SERVER_KEY=${NAKAMA_SERVER_KEY}"
      - "NAKAMA_HTTP_KEY=${NAKAMA_SERVER_KEY}"
      # VK OAuth - настройки из VK Developer
      - "NAKAMA_SOCIAL_VK_APP_ID=54454085"
      - "NAKAMA_SOCIAL_VK_APP_SECRET=2YzfK5U0iNWnkwvuWSlO"
      # Telegram Bot Token для custom authentication
      - "TELEGRAM_BOT_TOKEN=8437963041:AAFRWQQGvyfsnRT3VX7baj9xtjohq-1UT4c"
      # Безопасность - кастомные ключи шифрования
      - "NAKAMA_SESSION_ENCRYPTION_KEY=${NAKAMA_SESSION_ENCRYPTION_KEY}"
      - "NAKAMA_SESSION_SIGNING_KEY=${NAKAMA_SESSION_SIGNING_KEY}"
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address=nakama_user:${POSTGRES_PASSWORD:-ChangeMe_Strong_Password_123}@postgres:5432/nakama
        &&
        exec /nakama/nakama
        --name mmorpg_server
        --database.address=nakama_user:${POSTGRES_PASSWORD:-ChangeMe_Strong_Password_123}@postgres:5432/nakama
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --socket.server_key "${NAKAMA_SERVER_KEY:-defaultkey}"
        --runtime.http_key "${NAKAMA_SERVER_KEY:-defaultkey}"
        --runtime.path /nakama/data/modules
        --socket.max_message_size_bytes 4096
        --socket.max_request_size_bytes 131072
        --socket.read_buffer_size_bytes 4096
        --socket.write_buffer_size_bytes 4096
    volumes:
      - ./nakama/modules:/nakama/data/modules:ro
      - nakama_data:/nakama/data
    ports:
      - "0.0.0.0:7349:7349"   # gRPC API
      - "0.0.0.0:7350:7350"   # HTTP API + WebSocket
      - "0.0.0.0:7351:7351"   # Console (Admin панель)
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mmorpg_network

# ============================================
# Volumes — хранилище данных
# ============================================
volumes:
  postgres_data:
    driver: local
  nakama_data:
    driver: local

# ============================================
# Network — внутренняя сеть
# ============================================
networks:
  mmorpg_network:
    driver: bridge
